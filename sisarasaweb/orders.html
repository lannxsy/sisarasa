<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sisarasa Toko | Kelola Pesanan</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="brand">
      <i class="fa-solid fa-leaf"></i> Sisarasa
    </div>
    <div class="nav flex-column">
      <a href="index.html" class="nav-link"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
      <a href="menu.html" class="nav-link"><i class="fa-solid fa-utensils"></i> Kelola Menu</a>
      <a href="orders.html" class="nav-link active"><i class="fa-solid fa-receipt"></i> Kelola Pesanan</a>
      <a href="laporan.html" class="nav-link"><i class="fa-solid fa-chart-line"></i> Laporan</a>
      <a href="settings.html" class="nav-link"><i class="fa-solid fa-gear"></i> Pengaturan Toko</a>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <div class="top-header">
      <h2 class="fw-bold mb-0">Kelola Pesanan</h2>
      <div class="d-flex align-items-center gap-4">
        <input type="text" class="form-control" id="searchInput" placeholder="Cari Kode Pesanan..." style="width: 220px;">
        <div class="position-relative" style="cursor: pointer;" title="Notifikasi" id="bellWrapper">
          <i class="fa-solid fa-bell fs-5 text-muted"></i>
          <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="notifBadge" style="font-size: 0.65rem; padding: 0.25em 0.5em; display:none;">0</span>
        </div>
        <div class="user-profile d-none d-md-flex">
          <img src="https://ui-avatars.com/api/?name=Admin+Toko&background=ff6b6b&color=fff" alt="Admin" style="width: 40px; height: 40px; border-radius: 50%;">
          <div class="d-none d-md-block">
            <div class="fw-bold user-profile-name" style="font-size: 0.9rem;">Mitra Sisarasa</div>
            <div class="text-muted" style="font-size: 0.8rem;">Admin Toko</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Orders Table -->
    <div class="table-container">
      <div class="table-responsive">
        <table class="table table-hover">
          <thead>
            <tr>
              <th>Kode</th>
              <th>Waktu</th>
              <th>Pembeli</th>
              <th>Item</th>
              <th>Total</th>
              <th>Status</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="ordersTableBody">
            <tr id="loadingRow">
              <td colspan="7" class="text-center text-muted py-4">
                <i class="fa-solid fa-spinner fa-spin me-2"></i> Mendengarkan pesanan masuk...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Order Detail Modal -->
  <div class="modal fade" id="orderDetailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content" style="border-radius: 16px; border: none;">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title fw-bold" id="orderDetailTitle">Detail Pesanan</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" id="orderDetailBody">
          <!-- Filled by JS -->
        </div>
        <div class="modal-footer border-0 pt-0">
          <button type="button" class="btn btn-light w-100 mb-2" data-bs-dismiss="modal">Tutup</button>
          <div class="d-flex w-100 gap-2">
            <button type="button" class="btn btn-outline-danger flex-fill" id="rejectOrderBtn">Tolak Pesanan</button>
            <button type="button" class="btn btn-primary-custom flex-fill" id="acceptOrderBtn">Terima Pesanan</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Delete Order Confirmation Modal -->
  <div class="modal fade" id="deleteOrderModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered">
      <div class="modal-content" style="border-radius:16px;border:none">
        <div class="modal-body text-center p-4">
          <i class="fa-solid fa-triangle-exclamation fs-1 text-warning mb-3"></i>
          <h5 class="fw-bold">Hapus Pesanan?</h5>
          <p class="text-muted small" id="deleteOrderMsg">Pesanan ini akan dihapus permanen.</p>
          <div class="d-flex gap-2 mt-3">
            <button class="btn btn-light flex-fill" data-bs-dismiss="modal">Batal</button>
            <button class="btn btn-danger flex-fill" id="confirmDeleteOrderBtn">Hapus</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
  <script type="module" src="assets/js/auth-guard.js"></script>
  <script type="module">
    import { db } from './assets/js/firebase-config.js';
    import {
      collection, doc, query, orderBy, onSnapshot, updateDoc, where, getDocs, deleteDoc, runTransaction
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    let uid = localStorage.getItem('userUid');
    const tableBody = document.getElementById('ordersTableBody');
    const detailModal = new bootstrap.Modal(document.getElementById('orderDetailModal'));
    let currentDetailOrderId = null;
    let ordersCache = {};       // id -> dokumen asli (raw)
    let normalizedCache = {};   // id -> hasil normalizeOrder()

    // bagId (magic_bags) milik toko ini. Dipakai sebagai fallback untuk
    // mencocokkan order LAMA yang dibuat sebelum field storeId ada di
    // dokumen orders. Order baru sudah langsung punya storeId.
    let myBagIds = new Set();

    async function loadMyBagIds() {
      try {
        const menuSnap = await getDocs(collection(db, 'stores', uid, 'menus'));
        menuSnap.forEach(d => {
          const magicBagId = d.data().magicBagId;
          if (magicBagId) myBagIds.add(magicBagId);
        });
      } catch (err) {
        console.error('Gagal memuat daftar magic bag toko:', err);
      }
    }

    // ── Normalisasi dokumen order ───────────────────────────────────────────
    // Order baru sudah punya field standar: orderCode, buyerName, buyerPhone,
    // itemName, qty, totalPrice, pickupCode, storeId.
    // Order LAMA hanya punya: tokoNama, bagId, harga, jumlah, kodePickup,
    // userEmail, dan TIDAK punya storeId. Fungsi ini menyamakan keduanya.
    function normalizeOrder(id, data) {
      return {
        orderCode: data.orderCode || data.kodePickup || id.slice(-6).toUpperCase(),
        buyerName: data.buyerName || data.userEmail || '-',
        buyerPhone: data.buyerPhone || '',
        // JANGAN fallback ke data.tokoNama — itu nama TOKO (dirinya sendiri),
        // bukan nama menu yang dipesan.
        itemName: data.itemName || data.namaMenu || '-',
        emoji: data.emoji || '🛍️',
        imageUrl: data.imageUrl || '',
        qty: data.qty || data.jumlah || 1,
        subtotal: data.subtotal ?? data.harga ?? data.totalPrice ?? 0,
        serviceFee: data.serviceFee || 0,
        totalPrice: data.totalPrice ?? data.harga ?? 0,
        pickupCode: data.pickupCode || data.kodePickup || '-',
        status: data.status || 'pending',
        createdAt: data.createdAt,
        belongsToStore: data.storeId === uid || (!!data.bagId && myBagIds.has(data.bagId)),
      };
    }

    // ── Badge classes ─────────────────────────────────────────────────────────
    const badgeClass = { pending: 'badge-pending', confirmed: 'badge-confirmed', completed: 'badge-completed', cancelled: 'badge-cancelled' };
    const badgeLabel = { pending: 'Pending', confirmed: 'Confirmed', completed: 'Selesai', cancelled: 'Batal' };

    // ── Format timestamp ──────────────────────────────────────────────────────
    function formatTime(ts) {
      if (!ts) return '-';
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleString('id-ID', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: 'short' });
    }

    // Komisi admin platform: 5%, HANYA dipotong dari transaksi senilai
    // Rp50.000 ke atas — sama aturannya dengan index.html/laporan.html,
    // dipakai buat nampilin rincian potongan per pesanan di modal detail.
    const KOMISI_PERSEN = 5;
    const BATAS_KOMISI = 50000;
    function hitungOmzetBersih(totalPrice) {
      const kenaKomisi = totalPrice >= BATAS_KOMISI;
      const potongan = kenaKomisi ? Math.round(totalPrice * (KOMISI_PERSEN / 100)) : 0;
      return { potongan, bersih: totalPrice - potongan, kenaKomisi };
    }

    // ── Kembalikan stok (dipakai buat cancel/reject DAN hapus pesanan) ────────
    // PENTING: stok itu tersimpan di DUA tempat yang harus selalu sinkron:
    //   1. magic_bags/{bagId}.stok        -> dipakai app pembeli
    //   2. stores/{storeId}/menus/{id}.stock -> dipakai halaman Kelola Menu
    // Sebelumnya restore stok cuma nyentuh magic_bags, jadi angka di Kelola
    // Menu gak pernah balik walau stok yang dilihat pembeli udah bener.
    // `newStatus` diisi 'cancelled' buat cancel/reject, atau null kalau
    // order-nya mau DIHAPUS (bukan sekadar diubah statusnya).
    async function restoreStockAndFinalize(orderId, newStatus) {
      const raw = ordersCache[orderId];
      const bagId = raw?.bagId;
      const storeId = raw?.storeId;
      const qty = Number(raw?.qty ?? raw?.jumlah ?? 1);
      // Stok CUMA dikembalikan kalau order belum pernah completed/cancelled
      // sebelumnya — order yang sudah completed berarti barangnya sudah
      // benar-benar diambil pembeli (jangan ditambah lagi), dan order yang
      // sudah cancelled berarti stoknya sudah pernah dikembalikan sekali.
      const sudahFinal = raw?.status === 'completed' || raw?.status === 'selesai'
                        || raw?.status === 'cancelled' || raw?.status === 'batal';

      const orderRef = doc(db, 'orders', orderId);

      if (!sudahFinal && bagId) {
        await runTransaction(db, async (tx) => {
          const bagRef = doc(db, 'magic_bags', bagId);
          const bagSnap = await tx.get(bagRef);

          // Cari dokumen menu yang terhubung (kalau ada) SEBELUM nulis apa
          // pun — semua tx.get() Firestore wajib dijalankan sebelum tx.set/
          // tx.update di transaction yang sama.
          let menuRef = null, menuSnap = null;
          if (bagSnap.exists() && bagSnap.data().menuDocId && storeId) {
            menuRef = doc(db, 'stores', storeId, 'menus', bagSnap.data().menuDocId);
            menuSnap = await tx.get(menuRef);
          }

          if (bagSnap.exists()) {
            const stokSekarang = Number(bagSnap.data().stok ?? 0);
            tx.update(bagRef, { stok: stokSekarang + qty });
          }
          // Menu lama (dibuat sebelum fix sinkronisasi stok) mungkin gak
          // punya menuDocId di magic_bags-nya — kalau gitu, cuma magic_bags
          // yang ke-update, sama seperti sebelumnya.
          if (menuRef && menuSnap && menuSnap.exists()) {
            const stockMenuSekarang = Number(menuSnap.data().stock ?? 0);
            tx.update(menuRef, { stock: stockMenuSekarang + qty });
          }

          if (newStatus) tx.update(orderRef, { status: newStatus });
          else tx.delete(orderRef);
        });
      } else {
        if (newStatus) await updateDoc(orderRef, { status: newStatus });
        else await deleteDoc(orderRef);
      }
    }

    // ── Render row ────────────────────────────────────────────────────────────
    function renderRow(id, n) {
      const cls = badgeClass[n.status] || '';
      const lbl = badgeLabel[n.status] || n.status;
      const thumb = n.imageUrl
        ? `<img src="${n.imageUrl}" style="width:28px;height:28px;border-radius:6px;object-fit:cover;margin-right:6px" onerror="this.style.display='none'">`
        : `<span style="margin-right:6px">${n.emoji}</span>`;
      return `
        <tr id="row-${id}">
          <td class="fw-bold">#${n.orderCode}</td>
          <td>${formatTime(n.createdAt)}</td>
          <td>${n.buyerName}</td>
          <td class="text-muted small d-flex align-items-center">${thumb}${n.itemName} x${n.qty}</td>
          <td class="fw-bold">Rp ${Number(n.totalPrice || 0).toLocaleString('id-ID')}</td>
          <td><span class="badge ${cls}" id="badge-${id}">${lbl}</span></td>
          <td>
            <div class="d-flex gap-2 align-items-center">
              <select class="form-select form-select-sm w-auto" onchange="changeStatus('${id}', this)">
                <option value="pending" ${n.status==='pending'?'selected':''}>Pending</option>
                <option value="confirmed" ${n.status==='confirmed'?'selected':''}>Confirmed</option>
                <option value="completed" ${n.status==='completed'?'selected':''}>Selesai</option>
                <option value="cancelled" ${n.status==='cancelled'?'selected':''}>Batal</option>
              </select>
              <button class="btn btn-sm btn-light py-1" onclick="showDetail('${id}')" title="Detail"><i class="fa-solid fa-eye"></i></button>
              <button class="btn btn-sm btn-light text-danger py-1" onclick="promptDeleteOrder('${id}')" title="Hapus"><i class="fa-solid fa-trash"></i></button>
            </div>
          </td>
        </tr>`;
    }

    // ── Real-time listener ────────────────────────────────────────────────────
    // WAJIB pakai where('storeId','==',uid) — bukan opsional. Rule baca
    // orders berbasis ISI dokumen (auth.uid harus cocok userId ATAU storeId
    // pada dokumen itu), jadi Firestore gak bisa membuktikan query TANPA
    // where ini aman buat semua kemungkinan hasil, dan akan MENOLAK TOTAL
    // request-nya (permission-denied) — bukan diam-diam nyaring di server.
    // Konsekuensi: order lama dari sebelum field storeId konsisten diisi
    // gak akan muncul di sini lagi; itu data lama, lebih baik begitu
    // daripada listener-nya gagal buat semua toko.
    function listenOrders() {
      const q = query(
        collection(db, 'orders'),
        where('storeId', '==', uid),
        orderBy('createdAt', 'desc')
      );

      onSnapshot(q, (snapshot) => {
        ordersCache = {};
        normalizedCache = {};
        let pendingCount = 0;
        let html = '';
        let shown = 0;

        snapshot.forEach(docSnap => {
          const data = docSnap.data();
          const n = normalizeOrder(docSnap.id, data);

          ordersCache[docSnap.id] = data;
          normalizedCache[docSnap.id] = n;
          html += renderRow(docSnap.id, n);
          if (n.status === 'pending') pendingCount++;
          shown++;
        });

        if (shown === 0) {
          tableBody.innerHTML = `<tr><td colspan="7" class="text-center text-muted py-4">Belum ada pesanan masuk.</td></tr>`;
        } else {
          tableBody.innerHTML = html;
        }
        updateBell(pendingCount);
      }, (err) => {
        console.error('Gagal memuat orders:', err);
        tableBody.innerHTML = `<tr><td colspan="7" class="text-center text-danger py-4">Gagal memuat pesanan: ${err.message}</td></tr>`;
      });
    }

    // ── Update bell badge ─────────────────────────────────────────────────────
    function updateBell(count) {
      const badge = document.getElementById('notifBadge');
      if (count > 0) {
        badge.textContent = count;
        badge.style.display = '';
      } else {
        badge.style.display = 'none';
      }
      localStorage.setItem('pendingOrders', count);
    }

    // ── Change status via dropdown ────────────────────────────────────────────
    window.changeStatus = async function(id, selectEl) {
      const newStatus = selectEl.value;
      try {
        if (newStatus === 'cancelled') {
          await restoreStockAndFinalize(id, 'cancelled');
        } else {
          await updateDoc(doc(db, 'orders', id), { status: newStatus });
        }
      } catch (err) {
        alert('Gagal mengubah status: ' + err.message);
      }
    };

    // ── Hapus pesanan ──────────────────────────────────────────────────────────
    let orderToDelete = null;
    window.promptDeleteOrder = function(id) {
      orderToDelete = id;
      const n = normalizedCache[id];
      const msg = n ? `Hapus pesanan #${n.orderCode} dari ${n.buyerName}?` : 'Hapus pesanan ini?';
      document.getElementById('deleteOrderMsg').textContent = msg;
      new bootstrap.Modal(document.getElementById('deleteOrderModal')).show();
    };

    document.getElementById('confirmDeleteOrderBtn').addEventListener('click', async () => {
      if (!orderToDelete) return;
      try {
        // Pakai helper yang sama dengan cancel/reject, supaya restore stok
        // (magic_bags DAN stores/.../menus) selalu konsisten di semua jalur,
        // bukan cuma di-handle terpisah-pisah tiap tombol.
        await restoreStockAndFinalize(orderToDelete, null);
        bootstrap.Modal.getInstance(document.getElementById('deleteOrderModal')).hide();
        orderToDelete = null;
      } catch (err) {
        alert('Gagal menghapus pesanan: ' + err.message);
      }
    });

    // ── Show detail modal ─────────────────────────────────────────────────────
    window.showDetail = function(id) {
      const n = normalizedCache[id];
      if (!n) return;
      currentDetailOrderId = id;

      const cls = badgeClass[n.status] || '';
      const lbl = badgeLabel[n.status] || n.status;

      document.getElementById('orderDetailTitle').textContent = `Detail Pesanan #${n.orderCode}`;
      document.getElementById('orderDetailBody').innerHTML = `
        <div class="d-flex justify-content-between mb-3 pb-3 border-bottom">
          <div>
            <div class="text-muted small">Waktu Pemesanan</div>
            <div class="fw-medium">${formatTime(n.createdAt)}</div>
          </div>
          <div class="text-end">
            <div class="text-muted small">Status</div>
            <span class="badge ${cls}">${lbl}</span>
          </div>
        </div>

        <h6 class="fw-bold mb-3">Informasi Pembeli</h6>
        <div class="d-flex align-items-center mb-4">
          <div class="me-3">
            <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(n.buyerName||'?')}&background=e2e8f0"
                 class="rounded-circle" width="40" alt="Buyer">
          </div>
          <div>
            <div class="fw-bold">${n.buyerName}</div>
          </div>
        </div>

        <h6 class="fw-bold mb-3">Rincian Pesanan</h6>
        <div class="d-flex align-items-center gap-3 mb-3">
          ${n.imageUrl
            ? `<img src="${n.imageUrl}" style="width:56px;height:56px;border-radius:10px;object-fit:cover" onerror="this.style.display='none'">`
            : `<div style="width:56px;height:56px;border-radius:10px;background:#dcfce7;display:flex;align-items:center;justify-content:center;font-size:26px">${n.emoji}</div>`
          }
          <div>
            <div class="fw-bold">${n.itemName}</div>
            <div class="text-muted small">Jumlah: ${n.qty}x Magic Bag</div>
          </div>
        </div>
        <div class="d-flex justify-content-between mb-2">
          <div>${n.qty}x ${n.itemName}</div>
          <div class="fw-medium">Rp ${Number(n.subtotal || 0).toLocaleString('id-ID')}</div>
        </div>
        <div class="d-flex justify-content-between mb-2">
          <div>Biaya Layanan</div>
          <div class="fw-medium">Rp ${Number(n.serviceFee || 0).toLocaleString('id-ID')}</div>
        </div>
        <hr>
        <div class="d-flex justify-content-between mb-4">
          <div class="fw-bold">Total Pembayaran</div>
          <div class="fw-bold fs-5" style="color:var(--primary-color)">Rp ${Number(n.totalPrice || 0).toLocaleString('id-ID')}</div>
        </div>

        <h6 class="fw-bold mb-2">Potongan Admin</h6>
        <div class="bg-light p-3 rounded mb-4">
          ${(() => {
            const { potongan, bersih, kenaKomisi } = hitungOmzetBersih(n.totalPrice || 0);
            if (!kenaKomisi) {
              return `<div class="text-muted small">Tidak kena potongan — transaksi di bawah Rp50.000.</div>
                <div class="d-flex justify-content-between mt-2">
                  <div class="fw-bold">Diterima Toko</div>
                  <div class="fw-bold text-success">Rp ${bersih.toLocaleString('id-ID')}</div>
                </div>`;
            }
            return `
              <div class="d-flex justify-content-between mb-1">
                <div class="text-muted small">Komisi Admin (${KOMISI_PERSEN}%)</div>
                <div class="text-danger small">- Rp ${potongan.toLocaleString('id-ID')}</div>
              </div>
              <div class="d-flex justify-content-between">
                <div class="fw-bold">Diterima Toko</div>
                <div class="fw-bold text-success">Rp ${bersih.toLocaleString('id-ID')}</div>
              </div>`;
          })()}
        </div>

        <h6 class="fw-bold mb-2">Kode Pickup</h6>
        <div class="bg-light p-3 rounded text-center mb-3">
          <h3 class="fw-bold mb-0" style="letter-spacing: 5px;">${n.pickupCode}</h3>
        </div>`;

      const acceptBtn = document.getElementById('acceptOrderBtn');
      const rejectBtn = document.getElementById('rejectOrderBtn');
      if (n.status === 'pending') {
        acceptBtn.style.display = '';
        rejectBtn.style.display = '';
      } else {
        acceptBtn.style.display = 'none';
        rejectBtn.style.display = 'none';
      }

      detailModal.show();
    };

    // ── Accept / Reject from modal ────────────────────────────────────────────
    document.getElementById('acceptOrderBtn').addEventListener('click', async () => {
      if (!currentDetailOrderId) return;
      await updateDoc(doc(db, 'orders', currentDetailOrderId), { status: 'confirmed' });
      detailModal.hide();
    });

    document.getElementById('rejectOrderBtn').addEventListener('click', async () => {
      if (!currentDetailOrderId) return;
      try {
        await restoreStockAndFinalize(currentDetailOrderId, 'cancelled');
      } catch (err) {
        alert('Gagal menolak pesanan: ' + err.message);
      }
      detailModal.hide();
    });

    // ── Search filter ─────────────────────────────────────────────────────────
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      document.querySelectorAll('#ordersTableBody tr').forEach(row => {
        row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
      });
    });

    // ── Init: tunggu auth-guard.js memastikan status login ──────────────────────
    let started = false;
    async function startOrdersPage(currentUid) {
      if (started) return;
      started = true;
      uid = currentUid;
      await loadMyBagIds();
      listenOrders();
    }
    // PENTING: jangan start pakai localStorage langsung di sini — itu race
    // condition, karena localStorage bisa kebawa dari sesi lama padahal
    // Firebase Auth SDK belum selesai resolve (request.auth masih null pas
    // Firestore di-query → permission-denied → listener mati & 'started'
    // sudah terlanjur true sehingga sisarasa:authReady susulan diabaikan).
    // Tunggu auth-guard.js yang jadi satu-satunya sumber kebenaran login.
    document.addEventListener('sisarasa:authReady', (e) => {
      if (e.detail.uid) startOrdersPage(e.detail.uid);
    });
  </script>
